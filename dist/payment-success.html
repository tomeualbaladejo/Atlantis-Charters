<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago confirmado — Atlantis Charters</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #F5F0E8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    }
    .icon {
      font-size: 56px;
      margin-bottom: 20px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: #1C1C1A;
      margin-bottom: 12px;
    }
    p {
      color: #6B6860;
      line-height: 1.7;
      margin-bottom: 8px;
      font-size: 15px;
    }
    .amount {
      background: #F0FFF4;
      border: 1px solid #C3E6CB;
      border-radius: 12px;
      padding: 16px;
      margin: 24px 0;
    }
    .amount p {
      color: #2E7D32;
      font-weight: 500;
      margin: 0;
    }
    .btn {
      display: inline-block;
      margin-top: 24px;
      background: #C85A4A;
      color: white;
      padding: 14px 32px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
    }
    .btn:hover {
      background: #B04A3A;
    }
    .whatsapp {
      display: inline-block;
      margin-top: 12px;
      background: #25D366;
      color: white;
      padding: 12px 28px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 14px;
    }
    .whatsapp:hover {
      background: #20BD5A;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⛵</div>
    <h1>¡Pago recibido!</h1>
    <p>Tu depósito ha sido procesado correctamente.</p>
    <p>El capitán revisará tu reserva y recibirás un email de confirmación en breve.</p>

    <div class="amount">
      <p>✅ Depósito pagado con éxito</p>
      <p style="font-size: 13px; margin-top: 4px;">El resto se abona el día de la salida a bordo</p>
    </div>

    <p style="font-size: 13px;">¿Tienes alguna pregunta? Escríbenos:</p>
    <a href="https://wa.me/34611062419" class="whatsapp">💬 WhatsApp</a>
    <br>
    <a href="/" class="btn">Volver a la web</a>
  </div>
</body>
</html>
